name: Deploy to Cloudflare

on:
  push:
    branches: [feat/cloudflare-workers]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ==================== 环境准备 ====================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: pip install requests

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # ==================== 获取 Account ID ====================

      - name: Fetch Account ID
        id: account
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            ACCOUNT_ID="$CLOUDFLARE_ACCOUNT_ID"
          else
            ACCOUNT_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" | jq -r '.result[0].id')
            if [[ -z "$ACCOUNT_ID" ]] || [[ "$ACCOUNT_ID" == "null" ]]; then
              echo "❌ 无法获取账户 ID，请检查 CLOUDFLARE_API_TOKEN"
              exit 1
            fi
          fi
          echo "::add-mask::${ACCOUNT_ID}"
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Account ID 已获取"

      # ==================== D1 数据库初始化 ====================

      - name: Init D1 Database
        id: d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}
          D1_NAME: fiammetta_d1
          INIT_SQL_PATH: init.sql
        run: python3 deploy/init_d1.py

      # ==================== KV 命名空间初始化 ====================

      - name: Init KV Namespace
        id: kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}
          KV_NAME: fiammetta-proxy
        run: python3 deploy/init_kv.py

      # ==================== 替换 wrangler.toml 占位符 ====================

      - name: Update Wrangler Configs
        env:
          D1_ID: ${{ steps.d1.outputs.D1_ID }}
          KV_ID: ${{ steps.kv.outputs.KV_ID }}
        run: |
          # Worker wrangler.toml
          sed -i "s|placeholder-d1-id|$D1_ID|g" worker/wrangler.toml
          sed -i "s|placeholder-kv-id|$KV_ID|g" worker/wrangler.toml

          # 根目录 wrangler.toml（Pages）
          sed -i "s|00000000-0000-0000-0000-000000000000|$D1_ID|g" wrangler.toml

          echo "✅ Wrangler 配置已更新"

      # ==================== 安装依赖 & 构建 ====================

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Pages
        run: npx @cloudflare/next-on-pages

      # ==================== 部署 Worker ====================

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd worker
          npx wrangler deploy
          echo "✅ Worker 部署完成"

      # ==================== Pages 项目 + 绑定 + Secrets ====================

      - name: Init Pages Project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}
          D1_ID: ${{ steps.d1.outputs.D1_ID }}
          KV_ID: ${{ steps.kv.outputs.KV_ID }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: python3 deploy/init_pages.py

      # ==================== 部署 Pages ====================

      - name: Deploy Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler pages deploy .vercel/output/static --project-name=fiammetta-watcher
          echo "✅ Pages 部署完成"

      # ==================== 完成 ====================

      - name: Done
        run: echo "🎉 部署完成"
