name: HF Space 同步

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 检查配置
        id: check
        env:
          HF_REPO: ${{ secrets.HF_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_REPO" ]; then
            echo "❌ 未配置 HF_REPO 密钥，跳过同步"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$HF_TOKEN" ]; then
            echo "❌ 未配置 HF_TOKEN 密钥，跳过同步"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "✅ HF 配置检查通过"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "repo=$HF_REPO" >> "$GITHUB_OUTPUT"

      - name: 检出代码
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git 身份
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加 HF 远程仓库
        if: steps.check.outputs.skip != 'true'
        env:
          HF_REPO: ${{ secrets.HF_REPO }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf "https://oauth2:$HF_TOKEN@huggingface.co/spaces/$HF_REPO"
          # 显式将远程 main 分支拉取并映射到本地的 refs/remotes/hf/main
          git fetch hf main:refs/remotes/hf/main --depth=1 --force 2>&1 || true
          echo "---"
          echo "remote URL host:"
          git remote get-url hf | sed 's|https://[^@]*@|https://***@|'

      - name: 检查差异
        if: steps.check.outputs.skip != 'true'
        id: diff
        run: |
          LOCAL=$(git rev-parse HEAD)
          # 使用 --verify 和 -q 确保只验证 commit 引用，失败时不输出多余的路径字符串
          HF=$(git rev-parse --verify -q refs/remotes/hf/main || echo "none")
          
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "hf=$HF" >> "$GITHUB_OUTPUT"
          
          if [ "$LOCAL" = "$HF" ]; then
            echo "synced=true" >> "$GITHUB_OUTPUT"
            echo "✅ HF Space 已是最新，无需同步"
          else
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "⚡ HF Space 需要同步"
            echo "  本地: $LOCAL"
            echo "  HF:   $HF"
          fi

      - name: 同步到 HF Space
        if: steps.check.outputs.skip != 'true' && steps.diff.outputs.synced == 'false'
        env:
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          echo "🚀 正在推送至 HF Space ($HF_REPO)..."
          git push hf main:main --force-with-lease
          echo "✅ 同步完成"

      - name: 同步结果
        if: steps.check.outputs.skip != 'true'
        env:
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          echo "HF Space ($HF_REPO) 同步状态:"
          if [ "${{ steps.diff.outputs.synced }}" = "true" ]; then
            echo "✅ 已同步"
          else
            echo "🔄 已推送更新"
          fi