name: HF Space 同步

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 检查配置
        id: check
        run: |
          if [ -z "${{ vars.HF_REPO }}" ]; then
            echo "❌ 未配置 HF_REPO 变量，跳过同步"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "❌ 未配置 HF_TOKEN 密钥，跳过同步"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "✅ HF 配置检查通过"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "repo=${{ vars.HF_REPO }}" >> "$GITHUB_OUTPUT"

      - name: 检出代码
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git 身份
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 添加 HF 远程仓库
        if: steps.check.outputs.skip != 'true'
        run: |
          git remote add hf "https://oauth2:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${{ steps.check.outputs.repo }}.git"
          git fetch hf main --depth=1

      - name: 检查差异
        if: steps.check.outputs.skip != 'true'
        id: diff
        run: |
          LOCAL=$(git rev-parse HEAD)
          HF=$(git rev-parse hf/main 2>/dev/null || echo "none")
          
          echo "local=$LOCAL" >> "$GITHUB_OUTPUT"
          echo "hf=$HF" >> "$GITHUB_OUTPUT"
          
          if [ "$LOCAL" = "$HF" ]; then
            echo "synced=true" >> "$GITHUB_OUTPUT"
            echo "✅ HF Space 已是最新，无需同步"
          else
            echo "synced=false" >> "$GITHUB_OUTPUT"
            echo "⚡ HF Space 需要同步"
            echo "  本地: $LOCAL"
            echo "  HF:   $HF"
          fi

      - name: 同步到 HF Space
        if: steps.check.outputs.skip != 'true' && steps.diff.outputs.synced == 'false'
        run: |
          echo "🚀 正在推送至 HF Space (${{ steps.check.outputs.repo }})..."
          git push hf main:main --force
          echo "✅ 同步完成"

      - name: 同步结果
        if: steps.check.outputs.skip != 'true'
        run: |
          if [ "${{ steps.diff.outputs.synced }}" = "true" ]; then
            echo "HF Space 同步状态: ✅ 已同步"
          else
            echo "HF Space 同步状态: 🔄 已推送更新"
          fi
