name = "fiammetta-watcher"
pages_build_output_dir = "dist"

# 环境变量
[vars]
ENVIRONMENT = "production"

# D1 数据库绑定（与 Worker 共享）
[[d1_databases]]
binding = "DB"
database_name = "fiammetta-proxy"
database_id = "<YOUR_D1_DATABASE_ID>"

# KV 命名空间绑定（速率限制、缓存）
[[kv_namespaces]]
binding = "KV"
id = "<YOUR_KV_NAMESPACE_ID>"
