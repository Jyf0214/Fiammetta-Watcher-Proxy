name = "fiammetta_worker"
main = "src/index.ts"
compatibility_date = "2025-04-02"
compatibility_flags = ["nodejs_compat"]

# D1 数据库绑定（Worker 和 Pages 共享同一个 D1）
[[d1_databases]]
binding = "DB"
database_name = "fiammetta_d1"
database_id = "placeholder-d1-id"  # 部署时由 Terraform/CI 替换

# KV 命名空间绑定（仅 Worker 使用：速率限制 + 熔断器状态缓存）
[[kv_namespaces]]
binding = "KV"
id = "placeholder-kv-id"  # 部署时由 Terraform/CI 替换

# Cron 定时任务
# 每小时：Key 用量重置检查
# 每 6 小时：平台模型发现
# 每天凌晨 3 点：日志归档
[triggers]
crons = ["0 */6 * * *", "0 */1 * * *", "0 3 * * *"]
